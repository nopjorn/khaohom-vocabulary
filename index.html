<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vocaberry - เกมทายคำศัพท์สำหรับเด็ก</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff6f91" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vocaberry" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo">🍓 Vocaberry</div>
      <div class="stars" id="starDisplay">⭐ 0</div>
    </header>

    <!-- หน้าจอเลือกหมวดหมู่ -->
    <section id="screen-menu" class="screen active">
      <h1 class="title">Choose a category! เลือกหมวดที่อยากเล่น!</h1>
      <div class="menu-toolbar">
        <button class="btn-secondary" id="btnReview">🖼️ ดูคำศัพท์ทั้งหมด (เช็ครูป/emoji)</button>
        <button class="btn-secondary" id="btnListenMode">🎧 เกมฟังเสียงทายภาพ</button>
      </div>
      <div class="category-grid" id="categoryGridReal"></div>
      <hr style="margin: 30px 0;"/>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <!-- หน้าจอเช็คคำศัพท์ทั้งหมดในแต่ละกลุ่ม -->
    <section id="screen-review" class="screen">
      <div class="game-header">
        <button class="btn-back" id="btnReviewBack">← Back กลับ</button>
        <div class="progress">Word Review เช็คคำศัพท์</div>
      </div>
      <div class="menu-toolbar">
        <button class="btn-secondary" id="btnReviewExpandAll">🔽 ขยายทั้งหมด</button>
        <button class="btn-secondary" id="btnReviewCollapseAll">🔼 ย่อทั้งหมด</button>
      </div>
      <div id="reviewContent"></div>
    </section>

    <!-- หน้าจอเลือกหมวดหมู่ของเกมฟังเสียงทายภาพ -->
    <section id="screen-listen-menu" class="screen">
      <div class="game-header">
        <button class="btn-back" id="btnListenMenuBack">← Back กลับ</button>
        <div class="progress">Listen &amp; Choose ฟังแล้วเลือกภาพ</div>
      </div>
      <div class="category-grid" id="listenCategoryGrid"></div>
    </section>

    <!-- หน้าจอเล่นเกมฟังเสียงทายภาพ -->
    <section id="screen-listen-game" class="screen">
      <div class="game-header">
        <button class="btn-back" id="btnListenBack">← Back กลับ</button>
        <div class="progress" id="listenProgressDisplay">1 / 8</div>
        <button class="btn-speak" id="btnListenReplay">🔊 ฟังอีกครั้ง</button>
      </div>

      <div class="question-card">
        <div class="listen-prompt-icon" id="listenPromptText">🎧</div>
      </div>

      <div class="image-options-grid" id="listenOptionsGrid"></div>

      <div class="feedback" id="listenFeedback"></div>
    </section>

    <!-- หน้าจอเล่นเกม -->
    <section id="screen-game" class="screen">
      <div class="game-header">
        <button class="btn-back" id="btnBack">← Back กลับ</button>
        <div class="progress" id="progressDisplay">1 / 8</div>
        <div class="speak-buttons">
          <button class="btn-speak" id="btnSpeakEn" title="Listen English ฟังภาษาอังกฤษ">🔊 EN</button>
          <button class="btn-speak" id="btnSpeakTh" title="ฟังภาษาไทย Listen Thai">🔊 ไทย</button>
        </div>
      </div>

      <div class="question-card">
        <div class="emoji-display" id="emojiDisplay">🐶</div>
      </div>

      <div class="options-grid" id="optionsGrid"></div>

      <div class="feedback" id="feedback"></div>
    </section>

    <!-- หน้าจอสรุปคะแนน -->
    <section id="screen-result" class="screen">
      <div class="result-card">
        <div class="result-emoji">🎉</div>
        <h1 class="title">Great job! เก่งมาก!</h1>
        <p class="result-score" id="resultScore">8 / 8 stars ได้ 8 ดาว จาก 8 ข้อ</p>
        <div class="result-buttons">
          <button class="btn-primary" id="btnPlayAgain">Play again เล่นอีกครั้ง</button>
          <button class="btn-secondary" id="btnMenu">New category เลือกหมวดใหม่</button>
        </div>
      </div>
    </section>

    <footer class="app-footer">v<span id="appVersion"></span></footer>
  </div>
