<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vocaberry - เกมทายคำศัพท์สำหรับเด็ก</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍓</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo">🍓 Vocaberry</div>
      <div class="stars" id="starDisplay">⭐ 0</div>
    </header>

    <!-- หน้าจอเลือกหมวดหมู่ -->
    <section id="screen-menu" class="screen active">
      <h1 class="title">Choose a category! เลือกหมวดที่อยากเล่น!</h1>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <!-- หน้าจอเล่นเกม -->
    <section id="screen-game" class="screen">
      <div class="game-header">
        <button class="btn-back" id="btnBack">← Back กลับ</button>
        <div class="progress" id="progressDisplay">1 / 8</div>
        <div class="speak-buttons">
          <button class="btn-speak" id="btnSpeakEn" title="Listen English ฟังภาษาอังกฤษ">🔊 EN</button>
          <button class="btn-speak" id="btnSpeakTh" title="ฟังภาษาไทย Listen Thai">🔊 ไทย</button>
        </div>
      </div>

      <div class="question-card">
        <div class="emoji-display" id="emojiDisplay">🐶</div>
      </div>

      <div class="options-grid" id="optionsGrid"></div>

      <div class="feedback" id="feedback"></div>
    </section>

    <!-- หน้าจอสรุปคะแนน -->
    <section id="screen-result" class="screen">
      <div class="result-card">
        <div class="result-emoji">🎉</div>
        <h1 class="title">Great job! เก่งมาก!</h1>
        <p class="result-score" id="resultScore">8 / 8 stars ได้ 8 ดาว จาก 8 ข้อ</p>
        <div class="result-buttons">
          <button class="btn-primary" id="btnPlayAgain">Play again เล่นอีกครั้ง</button>
          <button class="btn-secondary" id="btnMenu">New category เลือกหมวดใหม่</button>
        </div>
      </div>
    </section>
  </div>

  <script src="words/animals.js"></script>
  <script src="words/fruits.js"></script>
  <script src="words/vehicles.js"></script>
  <script src="words/colors.js"></script>
  <script src="words/numbers.js"></script>
  <script src="words/body.js"></script>
  <script src="words/family.js"></script>
  <script src="words/toys.js"></script>
  <script src="words/clothes.js"></script>
  <script src="words/school.js"></script>
  <script src="words/food.js"></script>
  <script src="words/nature.js"></script>
  <script src="words/shapes.js"></script>
  <script src="words/jobs.js"></script>
  <script src="words/weather.js"></script>
  <script src="words/rooms.js"></script>
  <script src="words/instruments.js"></script>
  <script src="words/sports.js"></script>
  <script src="words/insects.js"></script>
  <script src="words/time.js"></script>
  <script src="words/sea-animals.js"></script>
  <script src="words/emotions.js"></script>
  <script src="words/vegetables.js"></script>
  <script src="words/household.js"></script>
  <script src="words/places.js"></script>
  <script src="words/wild-animals.js"></script>
  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
